name: CI / Release

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------------------
  # ci: fast feedback on every push and PR.
  # Builds the debug APK (auto-signed with the debug keystore) and uploads it
  # as a workflow artifact.
  # ----------------------------------------------------------------------------
  ci:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Uses gradle-wrapper.jar to download Gradle 8.6 defined in
      # gradle/wrapper/gradle-wrapper.properties.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Build release APK (diagnostic)
        id: release_build
        continue-on-error: true
        run: |
          set +e
          ./gradlew :app:assembleRelease 2>&1 | tee /tmp/release.log
          RC=${PIPESTATUS[0]}
          exit $RC

      - name: Report release build failure
        if: steps.release_build.outcome == 'failure'
        run: |
          grep -A5 "What went wrong\|checkReleaseAarMetadata\|minSdkVersion\|compileSdk\|Dependency\|library request" /tmp/release.log | head -40 | while IFS= read -r l; do echo "::error::$l"; done
          echo "::notice::--- tail ---"
          tail -20 /tmp/release.log | while IFS= read -r l; do echo "::notice::$l"; done

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ssh-fs-provider-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ----------------------------------------------------------------------------
  # release: runs on main only.
  #
  # Uses semantic-release to:
  #   1. Analyse conventional commits since the last tag.
  #   2. Determine the next semver version (patch / minor / major).
  #   3. Write version.properties so Gradle stamps the APK correctly.
  #   4. Build the release APK (signed if SIGNING_KEY secret is set).
  #   5. Create a GitHub Release with the APK attached as an asset.
  #   6. Commit CHANGELOG.md back to main.
  #
  # Commit message conventions (Conventional Commits):
  #   fix: …          → patch bump   (1.0.0 → 1.0.1)
  #   feat: …         → minor bump   (1.0.0 → 1.1.0)
  #   feat!: … or
  #   BREAKING CHANGE → major bump   (1.0.0 → 2.0.0)
  #   chore:, docs:,
  #   style:, refactor:,
  #   perf:, test:    → no release
  # ----------------------------------------------------------------------------
  release:
    name: Release
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: write       # create releases, push changelog commit
      issues: write         # comment on released issues
      pull-requests: write  # comment on released PRs

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # semantic-release needs the full commit history to find the
          # previous release tag and analyse all commits since then.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release and plugins
        run: npm install

      # Decode the base64-encoded keystore so Gradle can sign the APK.
      # If the secret is absent, the release APK is left unsigned.
      - name: Decode signing key
        if: ${{ env.SIGNING_KEY != '' }}
        run: |
          echo "$SIGNING_KEY" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "SIGNING_KEY_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      # semantic-release lifecycle:
      #   prepare  → scripts/prepare-release.sh (writes version.properties,
      #              runs gradle assembleRelease, renames APK)
      #   publish  → creates GitHub Release with the APK as an asset
      #   success  → @semantic-release/git commits CHANGELOG.md to main
      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # Always remove the keystore file from the runner, even on failure.
      - name: Remove signing key
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"
